<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A.S.C.E.N.D. Admin Panel — Breslow QuoteApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    :root { --brand: #2563eb; --brand-dark: #1d4ed8; --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --border: #475569; --text: #e2e8f0; --text2: #94a3b8; --danger: #ef4444; --success: #22c55e; --warn: #f59e0b; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: var(--surface); }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .code-editor { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; tab-size: 2; white-space: pre-wrap; word-wrap: break-word; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }
    .btn-success { background: var(--success); color: white; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-yellow { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-purple { background: rgba(168,85,247,0.15); color: #c084fc; }
    input, select, textarea {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 100%;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(71,85,105,0.3); }
    tr:hover td { background: rgba(59,130,246,0.04); }
    .nav-item { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--brand); color: white; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 900px; width: 95%; max-height: 90vh; overflow-y: auto; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 200; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .prompt-var { background: rgba(59,130,246,0.15); color: #60a5fa; padding: 1px 4px; border-radius: 3px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ── Supabase Config ──────────────────────────────────────────────
    const SUPABASE_URL = "https://vwxmhrlkylrkcqoxvhij.supabase.co";
    const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3eG1ocmxreWxya2Nxb3h2aGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEwNTk2MzUsImV4cCI6MjA2NjYzNTYzNX0.6wIW1v1EAvBtuDxF4ZNpg_M2W5CLTrvPXoXDbPXuOF4";

    function createClient(serviceKey) {
      const key = serviceKey || ANON_KEY;
      return supabase.createClient(SUPABASE_URL, key);
    }

    // ── Icons (inline SVGs) ──────────────────────────────────────────
    const Icons = {
      home: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>,
      doc: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
      cpu: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/></svg>,
      bot: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
      gate: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
      link: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>,
      chat: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
      msg: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>,
      check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>,
      shield: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      dollar: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
      brain: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96.44 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 011.32-4.24 2.5 2.5 0 011.98-3A2.5 2.5 0 019.5 2z"/><path d="M14.5 2A2.5 2.5 0 0012 4.5v15a2.5 2.5 0 004.96.44 2.5 2.5 0 002.96-3.08 3 3 0 00.34-5.58 2.5 2.5 0 00-1.32-4.24 2.5 2.5 0 00-1.98-3A2.5 2.5 0 0014.5 2z"/></svg>,
      plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      edit: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
      copy: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>,
      refresh: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>,
      key: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
      eye: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      x: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      save: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>,
    };

    // ── Toast Component ──────────────────────────────────────────────
    function Toast({ message, type, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
      const bg = type === 'success' ? '#16a34a' : type === 'error' ? '#dc2626' : '#2563eb';
      return <div className="toast" style={{ background: bg, color: 'white' }}>{message}</div>;
    }

    // ── Confirm Modal ────────────────────────────────────────────────
    function ConfirmModal({ message, onConfirm, onCancel }) {
      return (
        <div className="modal-overlay" onClick={onCancel}>
          <div className="modal" style={{ maxWidth: 400, padding: 24 }} onClick={e => e.stopPropagation()}>
            <p style={{ marginBottom: 16 }}>{message}</p>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
              <button className="btn btn-danger" onClick={onConfirm}>Delete</button>
            </div>
          </div>
        </div>
      );
    }

    // ── JSON Viewer ──────────────────────────────────────────────────
    function JsonViewer({ data }) {
      if (!data) return <span style={{ color: 'var(--text2)' }}>null</span>;
      const str = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      return <pre className="code-editor" style={{ background: 'var(--bg)', padding: 12, borderRadius: 6, maxHeight: 300, overflow: 'auto', margin: 0, fontSize: 12 }}>{str}</pre>;
    }

    // ── Service Key Input ────────────────────────────────────────────
    function ServiceKeyBanner({ serviceKey, setServiceKey }) {
      const [show, setShow] = useState(false);
      const [temp, setTemp] = useState(serviceKey);
      return (
        <div style={{ background: serviceKey ? 'rgba(34,197,94,0.1)' : 'rgba(245,158,11,0.1)', border: `1px solid ${serviceKey ? 'rgba(34,197,94,0.3)' : 'rgba(245,158,11,0.3)'}`, borderRadius: 8, padding: '10px 16px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
          <Icons.key />
          {serviceKey ? (
            <span style={{ fontSize: 13 }}>Service role key active <span className="badge badge-green">Connected</span></span>
          ) : (
            <span style={{ fontSize: 13, color: 'var(--warn)' }}>Enter service_role key for full write access</span>
          )}
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            {!show ? (
              <button className="btn btn-outline" style={{ fontSize: 12 }} onClick={() => setShow(true)}>
                {serviceKey ? 'Change Key' : 'Set Key'}
              </button>
            ) : (
              <>
                <input type="password" value={temp} onChange={e => setTemp(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIs..." style={{ width: 300, fontSize: 12 }} />
                <button className="btn btn-primary" style={{ fontSize: 12 }} onClick={() => { setServiceKey(temp); setShow(false); }}>Save</button>
                <button className="btn btn-outline" style={{ fontSize: 12 }} onClick={() => setShow(false)}>Cancel</button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════
    // PROMPTS MANAGER (Primary Focus)
    // ══════════════════════════════════════════════════════════════════
    function PromptsManager({ db, toast }) {
      const [prompts, setPrompts] = useState([]);
      const [gates, setGates] = useState([]);
      const [models, setModels] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editing, setEditing] = useState(null);
      const [filter, setFilter] = useState('all');
      const [search, setSearch] = useState('');
      const [confirmDelete, setConfirmDelete] = useState(null);

      const load = useCallback(async () => {
        setLoading(true);
        const [pRes, gRes, mRes] = await Promise.all([
          db.from('prompts').select('*').order('gate_number', { ascending: true, nullsFirst: false }).order('version', { ascending: false }),
          db.from('gates').select('gate_number, name, step_code').order('gate_number'),
          db.from('llm_models').select('model_id, display_name, provider').order('display_name'),
        ]);
        setPrompts(pRes.data || []);
        setGates(gRes.data || []);
        setModels(mRes.data || []);
        setLoading(false);
      }, [db]);

      useEffect(() => { load(); }, [load]);

      const filtered = useMemo(() => {
        let list = prompts;
        if (filter === 'master') list = list.filter(p => p.prompt_type === 'master');
        else if (filter === 'gate') list = list.filter(p => p.prompt_type === 'gate');
        else if (filter === 'agent') list = list.filter(p => p.prompt_type === 'agent');
        else if (filter === 'active') list = list.filter(p => p.is_active);
        else if (filter === 'inactive') list = list.filter(p => !p.is_active);
        if (search) {
          const s = search.toLowerCase();
          list = list.filter(p => (p.name || '').toLowerCase().includes(s) || (p.developer_message || '').toLowerCase().includes(s) || String(p.gate_number).includes(s));
        }
        return list;
      }, [prompts, filter, search]);

      const gateName = (num) => {
        const g = gates.find(g => g.gate_number === num);
        return g ? `G${num}: ${g.name}` : `Gate ${num}`;
      };

      const handleSave = async (prompt) => {
        try {
          if (prompt.id) {
            const { error } = await db.from('prompts').update({
              name: prompt.name,
              prompt_type: prompt.prompt_type,
              gate_number: prompt.gate_number || null,
              agent_slug: prompt.agent_slug || null,
              version: prompt.version,
              is_active: prompt.is_active,
              developer_message: prompt.developer_message,
              variables_schema: prompt.variables_schema,
              model_override_id: prompt.model_override_id || null,
              temperature_override: prompt.temperature_override || null,
              notes: prompt.notes || null,
              created_by: prompt.created_by || null,
            }).eq('id', prompt.id);
            if (error) throw error;
            toast('Prompt updated', 'success');
          } else {
            const { error } = await db.from('prompts').insert({
              name: prompt.name,
              prompt_type: prompt.prompt_type,
              gate_number: prompt.gate_number || null,
              agent_slug: prompt.agent_slug || null,
              version: prompt.version || 1,
              is_active: prompt.is_active !== false,
              developer_message: prompt.developer_message,
              variables_schema: prompt.variables_schema || null,
              model_override_id: prompt.model_override_id || null,
              temperature_override: prompt.temperature_override || null,
              notes: prompt.notes || null,
              created_by: prompt.created_by || 'admin',
            });
            if (error) throw error;
            toast('Prompt created', 'success');
          }
          setEditing(null);
          load();
        } catch (e) {
          toast('Error: ' + e.message, 'error');
        }
      };

      const handleDelete = async (id) => {
        try {
          const { error } = await db.from('prompts').delete().eq('id', id);
          if (error) throw error;
          toast('Prompt deleted', 'success');
          setConfirmDelete(null);
          load();
        } catch (e) {
          toast('Error: ' + e.message, 'error');
        }
      };

      const handleDuplicate = (prompt) => {
        setEditing({
          ...prompt,
          id: null,
          name: prompt.name + ' (copy)',
          version: (prompt.version || 1) + 1,
          is_active: false,
          created_by: 'admin',
        });
      };

      const handleNewVersion = (prompt) => {
        setEditing({
          ...prompt,
          id: null,
          version: (prompt.version || 1) + 1,
          is_active: false,
          notes: `New version based on v${prompt.version}`,
          created_by: 'admin',
        });
      };

      if (loading) return <div style={{ padding: 40, textAlign: 'center', color: 'var(--text2)' }}>Loading prompts...</div>;

      return (
        <div className="fade-in">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>Prompts Manager</h2>
              <p style={{ margin: '4px 0 0', fontSize: 13, color: 'var(--text2)' }}>{prompts.length} prompts across {gates.length} gates</p>
            </div>
            <button className="btn btn-primary" onClick={() => setEditing({ prompt_type: 'gate', is_active: true, version: 1, developer_message: '', created_by: 'admin' })}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icons.plus /> New Prompt</span>
            </button>
          </div>

          {/* Filters */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
            {[['all','All'],['master','Master'],['gate','Gate'],['agent','Agent'],['active','Active'],['inactive','Inactive']].map(([k,l]) => (
              <button key={k} className={`btn ${filter === k ? 'btn-primary' : 'btn-outline'}`} onClick={() => setFilter(k)}>{l}</button>
            ))}
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search prompts..." style={{ width: 250, marginLeft: 'auto' }} />
            <button className="btn btn-outline" onClick={load} title="Refresh"><Icons.refresh /></button>
          </div>

          {/* Table */}
          <div className="card" style={{ overflow: 'auto' }}>
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Gate</th>
                  <th>Ver</th>
                  <th>Model Override</th>
                  <th>Status</th>
                  <th>Prompt Length</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => (
                  <tr key={p.id}>
                    <td style={{ fontWeight: 500, maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name || '—'}</td>
                    <td><span className={`badge ${p.prompt_type === 'master' ? 'badge-purple' : p.prompt_type === 'gate' ? 'badge-blue' : 'badge-yellow'}`}>{p.prompt_type}</span></td>
                    <td style={{ fontSize: 12 }}>{p.gate_number ? gateName(p.gate_number) : '—'}</td>
                    <td><span className="badge badge-blue">v{p.version}</span></td>
                    <td style={{ fontSize: 12, color: 'var(--text2)' }}>{p.model_override_id || '—'}</td>
                    <td>{p.is_active ? <span className="badge badge-green">Active</span> : <span className="badge badge-red">Inactive</span>}</td>
                    <td style={{ fontSize: 12, color: 'var(--text2)' }}>
                      {p.developer_message ? (
                        p.developer_message.startsWith('[LOADED_FROM_FILE]')
                          ? <span className="badge badge-yellow">File fallback</span>
                          : `${p.developer_message.length.toLocaleString()} chars`
                      ) : '—'}
                    </td>
                    <td>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button className="btn btn-outline" style={{ padding: '4px 8px' }} onClick={() => setEditing({...p})} title="Edit"><Icons.edit /></button>
                        <button className="btn btn-outline" style={{ padding: '4px 8px' }} onClick={() => handleNewVersion(p)} title="New Version"><Icons.copy /></button>
                        <button className="btn btn-outline" style={{ padding: '4px 8px', color: 'var(--danger)' }} onClick={() => setConfirmDelete(p.id)} title="Delete"><Icons.trash /></button>
                      </div>
                    </td>
                  </tr>
                ))}
                {filtered.length === 0 && <tr><td colSpan={8} style={{ textAlign: 'center', color: 'var(--text2)', padding: 40 }}>No prompts found</td></tr>}
              </tbody>
            </table>
          </div>

          {/* Edit Modal */}
          {editing && (
            <PromptEditor
              prompt={editing}
              gates={gates}
              models={models}
              onSave={handleSave}
              onClose={() => setEditing(null)}
            />
          )}

          {confirmDelete && (
            <ConfirmModal
              message="Are you sure you want to delete this prompt? This cannot be undone."
              onConfirm={() => handleDelete(confirmDelete)}
              onCancel={() => setConfirmDelete(null)}
            />
          )}
        </div>
      );
    }

    // ── Prompt Editor Modal ──────────────────────────────────────────
    function PromptEditor({ prompt, gates, models, onSave, onClose }) {
      const [form, setForm] = useState({ ...prompt });
      const [tab, setTab] = useState('editor');
      const textRef = useRef(null);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const variables = useMemo(() => {
        const matches = (form.developer_message || '').match(/\{[a-zA-Z_][a-zA-Z0-9_]*\}/g) || [];
        return [...new Set(matches.map(m => m.slice(1, -1)))];
      }, [form.developer_message]);

      const wordCount = useMemo(() => {
        return (form.developer_message || '').split(/\s+/).filter(Boolean).length;
      }, [form.developer_message]);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ padding: 0 }} onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h3 style={{ margin: 0, fontSize: 16 }}>{form.id ? 'Edit Prompt' : 'New Prompt'}</h3>
              <button className="btn btn-outline" style={{ padding: 4 }} onClick={onClose}><Icons.x /></button>
            </div>

            {/* Tabs */}
            <div style={{ display: 'flex', gap: 0, borderBottom: '1px solid var(--border)', padding: '0 24px' }}>
              {['editor', 'variables', 'preview'].map(t => (
                <button key={t} onClick={() => setTab(t)} style={{ padding: '10px 16px', fontSize: 13, background: 'none', border: 'none', color: tab === t ? 'var(--brand)' : 'var(--text2)', borderBottom: tab === t ? '2px solid var(--brand)' : '2px solid transparent', cursor: 'pointer', fontWeight: tab === t ? 600 : 400 }}>
                  {t.charAt(0).toUpperCase() + t.slice(1)}
                </button>
              ))}
            </div>

            <div style={{ padding: 24, maxHeight: '65vh', overflowY: 'auto' }} className="scrollbar-thin">
              {tab === 'editor' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  {/* Row 1: Name + Type */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 150px', gap: 12 }}>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Prompt Name</label>
                      <input value={form.name || ''} onChange={e => set('name', e.target.value)} placeholder="e.g., Gate 5 Color/Finish Prompt" />
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Type</label>
                      <select value={form.prompt_type || 'gate'} onChange={e => set('prompt_type', e.target.value)}>
                        <option value="master">Master</option>
                        <option value="gate">Gate</option>
                        <option value="agent">Agent</option>
                      </select>
                    </div>
                  </div>

                  {/* Row 2: Gate + Agent + Version */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 100px', gap: 12 }}>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Gate</label>
                      <select value={form.gate_number || ''} onChange={e => set('gate_number', e.target.value ? parseInt(e.target.value) : null)}>
                        <option value="">— None —</option>
                        {gates.map(g => <option key={g.gate_number} value={g.gate_number}>{g.gate_number} — {g.name} ({g.step_code})</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Agent Slug</label>
                      <select value={form.agent_slug || ''} onChange={e => set('agent_slug', e.target.value || null)}>
                        <option value="">— None —</option>
                        <option value="supervisor">Supervisor</option>
                        <option value="conversation">Conversation</option>
                        <option value="pricing">Pricing</option>
                        <option value="compliance">Compliance</option>
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Version</label>
                      <input type="number" min="1" value={form.version || 1} onChange={e => set('version', parseInt(e.target.value) || 1)} />
                    </div>
                  </div>

                  {/* Row 3: Model + Temperature */}
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 150px', gap: 12 }}>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Model Override</label>
                      <select value={form.model_override_id || ''} onChange={e => set('model_override_id', e.target.value || null)}>
                        <option value="">— Use default —</option>
                        {models.map(m => <option key={m.model_id} value={m.model_id}>{m.display_name} ({m.provider})</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Temperature</label>
                      <input type="number" step="0.1" min="0" max="2" value={form.temperature_override ?? ''} onChange={e => set('temperature_override', e.target.value ? parseFloat(e.target.value) : null)} placeholder="Default" />
                    </div>
                  </div>

                  {/* Developer Message */}
                  <div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                      <label style={{ fontSize: 12, color: 'var(--text2)' }}>Developer Message (System Prompt)</label>
                      <span style={{ fontSize: 11, color: 'var(--text2)' }}>{(form.developer_message || '').length.toLocaleString()} chars · {wordCount} words · {variables.length} vars</span>
                    </div>
                    <textarea
                      ref={textRef}
                      className="code-editor"
                      value={form.developer_message || ''}
                      onChange={e => set('developer_message', e.target.value)}
                      style={{ minHeight: 300, resize: 'vertical' }}
                      placeholder="Enter the system prompt here. Use {variable_name} for dynamic context injection..."
                    />
                    {variables.length > 0 && (
                      <div style={{ marginTop: 8, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                        {variables.map(v => <span key={v} className="prompt-var">{`{${v}}`}</span>)}
                      </div>
                    )}
                  </div>

                  {/* Row: Active + Notes + Created By */}
                  <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr 200px', gap: 12 }}>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Status</label>
                      <select value={form.is_active ? 'active' : 'inactive'} onChange={e => set('is_active', e.target.value === 'active')}>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Notes</label>
                      <input value={form.notes || ''} onChange={e => set('notes', e.target.value)} placeholder="Version notes..." />
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>Created By</label>
                      <input value={form.created_by || ''} onChange={e => set('created_by', e.target.value)} placeholder="admin" />
                    </div>
                  </div>
                </div>
              )}

              {tab === 'variables' && (
                <div>
                  <h4 style={{ fontSize: 14, marginBottom: 12 }}>Variables Schema</h4>
                  <p style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 12 }}>Define the expected variables for this prompt. This is used by the conversation agent to resolve context.</p>
                  <textarea
                    className="code-editor"
                    value={form.variables_schema ? (typeof form.variables_schema === 'string' ? form.variables_schema : JSON.stringify(form.variables_schema, null, 2)) : ''}
                    onChange={e => {
                      try { set('variables_schema', JSON.parse(e.target.value)); } catch { set('variables_schema', e.target.value); }
                    }}
                    style={{ minHeight: 200 }}
                    placeholder='{"PRODUCT_OPTIONS": "settings.product_options", "DIMENSION_CONTEXT": "settings.dimension_context"}'
                  />
                  <div style={{ marginTop: 16 }}>
                    <h4 style={{ fontSize: 14, marginBottom: 8 }}>Detected Variables in Prompt</h4>
                    {variables.length > 0 ? (
                      <table>
                        <thead><tr><th>Variable</th><th>Source</th></tr></thead>
                        <tbody>
                          {variables.map(v => (
                            <tr key={v}>
                              <td><span className="prompt-var">{`{${v}}`}</span></td>
                              <td style={{ fontSize: 12, color: 'var(--text2)' }}>
                                {v.startsWith('PRODUCT_') || v === 'DIMENSION_CONTEXT' || v === 'PRODUCT_OPTIONS' ? 'settings.*' : 'session.product_config.*'}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    ) : (
                      <p style={{ color: 'var(--text2)', fontSize: 13 }}>No variables detected. Use {'{variable_name}'} syntax in the developer message.</p>
                    )}
                  </div>
                </div>
              )}

              {tab === 'preview' && (
                <div>
                  <h4 style={{ fontSize: 14, marginBottom: 12 }}>Prompt Preview</h4>
                  <div className="card" style={{ padding: 16 }}>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
                      <div><span style={{ fontSize: 11, color: 'var(--text2)' }}>Type:</span> <span className={`badge ${form.prompt_type === 'master' ? 'badge-purple' : 'badge-blue'}`}>{form.prompt_type}</span></div>
                      <div><span style={{ fontSize: 11, color: 'var(--text2)' }}>Gate:</span> {form.gate_number || '—'}</div>
                      <div><span style={{ fontSize: 11, color: 'var(--text2)' }}>Version:</span> v{form.version}</div>
                      <div><span style={{ fontSize: 11, color: 'var(--text2)' }}>Status:</span> {form.is_active ? <span className="badge badge-green">Active</span> : <span className="badge badge-red">Inactive</span>}</div>
                    </div>
                    <pre className="code-editor" style={{ background: 'var(--bg)', padding: 16, borderRadius: 6, maxHeight: 400, overflow: 'auto', whiteSpace: 'pre-wrap' }}>{form.developer_message || '(empty)'}</pre>
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{ padding: '12px 24px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
              <button className="btn btn-outline" onClick={onClose}>Cancel</button>
              <button className="btn btn-primary" onClick={() => onSave(form)}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icons.save /> {form.id ? 'Update' : 'Create'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════
    // GENERIC TABLE MANAGER (for all other tables)
    // ══════════════════════════════════════════════════════════════════
    function GenericTable({ db, toast, tableName, columns, orderBy, readOnly, title, description }) {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editing, setEditing] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);

      const load = useCallback(async () => {
        setLoading(true);
        let query = db.from(tableName).select('*');
        if (orderBy) query = query.order(orderBy.col, { ascending: orderBy.asc !== false });
        const { data, error } = await query.limit(500);
        if (error) toast('Load error: ' + error.message, 'error');
        setRows(data || []);
        setLoading(false);
      }, [db, tableName]);

      useEffect(() => { load(); }, [load]);

      const handleSave = async (row) => {
        try {
          const pk = columns.find(c => c.pk);
          const pkField = pk ? pk.field : 'id';
          const payload = {};
          columns.filter(c => !c.pk && !c.auto).forEach(c => {
            let val = row[c.field];
            if (c.type === 'boolean') val = val === true || val === 'true';
            else if (c.type === 'number') val = val === '' || val === null ? null : Number(val);
            else if (c.type === 'json') {
              try { val = typeof val === 'string' ? JSON.parse(val) : val; } catch { }
            }
            payload[c.field] = val;
          });

          if (row._isNew) {
            const { error } = await db.from(tableName).insert(payload);
            if (error) throw error;
            toast('Created', 'success');
          } else {
            const { error } = await db.from(tableName).update(payload).eq(pkField, row[pkField]);
            if (error) throw error;
            toast('Updated', 'success');
          }
          setEditing(null);
          load();
        } catch (e) {
          toast('Error: ' + e.message, 'error');
        }
      };

      const handleDelete = async (row) => {
        try {
          const pk = columns.find(c => c.pk);
          const pkField = pk ? pk.field : 'id';
          const { error } = await db.from(tableName).delete().eq(pkField, row[pkField]);
          if (error) throw error;
          toast('Deleted', 'success');
          setConfirmDelete(null);
          load();
        } catch (e) {
          toast('Error: ' + e.message, 'error');
        }
      };

      if (loading) return <div style={{ padding: 40, textAlign: 'center', color: 'var(--text2)' }}>Loading {title}...</div>;

      const displayCols = columns.filter(c => !c.hidden);

      return (
        <div className="fade-in">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>{title}</h2>
              <p style={{ margin: '4px 0 0', fontSize: 13, color: 'var(--text2)' }}>{description} · {rows.length} rows</p>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-outline" onClick={load}><Icons.refresh /></button>
              {!readOnly && (
                <button className="btn btn-primary" onClick={() => {
                  const newRow = { _isNew: true };
                  columns.forEach(c => { newRow[c.field] = c.default ?? ''; });
                  setEditing(newRow);
                }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icons.plus /> Add</span>
                </button>
              )}
            </div>
          </div>

          <div className="card" style={{ overflow: 'auto' }}>
            <table>
              <thead>
                <tr>{displayCols.map(c => <th key={c.field}>{c.label || c.field}</th>)}{!readOnly && <th>Actions</th>}</tr>
              </thead>
              <tbody>
                {rows.map((row, i) => (
                  <tr key={row.id || row.slug || i}>
                    {displayCols.map(c => (
                      <td key={c.field} style={{ maxWidth: c.maxWidth || 300, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: 13 }}>
                        {c.type === 'boolean' ? (
                          row[c.field] ? <span className="badge badge-green">Yes</span> : <span className="badge badge-red">No</span>
                        ) : c.type === 'json' ? (
                          <span style={{ fontSize: 11, color: 'var(--text2)' }}>{row[c.field] ? JSON.stringify(row[c.field]).substring(0, 60) + '...' : '—'}</span>
                        ) : c.render ? c.render(row[c.field], row) : (
                          row[c.field] ?? '—'
                        )}
                      </td>
                    ))}
                    {!readOnly && (
                      <td>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn btn-outline" style={{ padding: '4px 8px' }} onClick={() => setEditing({...row})}><Icons.edit /></button>
                          <button className="btn btn-outline" style={{ padding: '4px 8px', color: 'var(--danger)' }} onClick={() => setConfirmDelete(row)}><Icons.trash /></button>
                        </div>
                      </td>
                    )}
                  </tr>
                ))}
                {rows.length === 0 && <tr><td colSpan={displayCols.length + 1} style={{ textAlign: 'center', color: 'var(--text2)', padding: 40 }}>No data</td></tr>}
              </tbody>
            </table>
          </div>

          {/* Edit Modal */}
          {editing && (
            <div className="modal-overlay" onClick={() => setEditing(null)}>
              <div className="modal" style={{ padding: 24, maxWidth: 600 }} onClick={e => e.stopPropagation()}>
                <h3 style={{ marginTop: 0, fontSize: 16 }}>{editing._isNew ? `New ${title}` : `Edit ${title}`}</h3>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {columns.filter(c => !c.auto && !c.pk).map(c => (
                    <div key={c.field}>
                      <label style={{ fontSize: 12, color: 'var(--text2)', display: 'block', marginBottom: 4 }}>{c.label || c.field}</label>
                      {c.type === 'boolean' ? (
                        <select value={editing[c.field] === true ? 'true' : 'false'} onChange={e => setEditing(prev => ({...prev, [c.field]: e.target.value === 'true'}))}>
                          <option value="true">Yes</option>
                          <option value="false">No</option>
                        </select>
                      ) : c.type === 'json' ? (
                        <textarea
                          className="code-editor"
                          value={typeof editing[c.field] === 'string' ? editing[c.field] : JSON.stringify(editing[c.field], null, 2) || ''}
                          onChange={e => setEditing(prev => ({...prev, [c.field]: e.target.value}))}
                          style={{ minHeight: 120 }}
                        />
                      ) : c.type === 'textarea' ? (
                        <textarea
                          value={editing[c.field] || ''}
                          onChange={e => setEditing(prev => ({...prev, [c.field]: e.target.value}))}
                          style={{ minHeight: 80 }}
                        />
                      ) : c.options ? (
                        <select value={editing[c.field] || ''} onChange={e => setEditing(prev => ({...prev, [c.field]: e.target.value}))}>
                          <option value="">—</option>
                          {c.options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}
                        </select>
                      ) : (
                        <input
                          type={c.type === 'number' ? 'number' : 'text'}
                          step={c.step}
                          value={editing[c.field] ?? ''}
                          onChange={e => setEditing(prev => ({...prev, [c.field]: e.target.value}))}
                        />
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 16 }}>
                  <button className="btn btn-outline" onClick={() => setEditing(null)}>Cancel</button>
                  <button className="btn btn-primary" onClick={() => handleSave(editing)}>
                    <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icons.save /> Save</span>
                  </button>
                </div>
              </div>
            </div>
          )}

          {confirmDelete && (
            <ConfirmModal
              message={`Delete this ${title.replace(/s$/, '')} row?`}
              onConfirm={() => handleDelete(confirmDelete)}
              onCancel={() => setConfirmDelete(null)}
            />
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════════
    // DASHBOARD
    // ══════════════════════════════════════════════════════════════════
    function Dashboard({ db }) {
      const [stats, setStats] = useState({});
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        (async () => {
          const tables = ['llm_models','agents','gates','prompts','gate_agent_map','conversations','conversation_messages','gate_results','agent_decisions','compliance_checks','pricing_traces'];
          const results = {};
          await Promise.all(tables.map(async t => {
            const { count } = await db.from(t).select('*', { count: 'exact', head: true });
            results[t] = count || 0;
          }));
          setStats(results);
          setLoading(false);
        })();

      if (loading) return <div style={{ padding: 40, textAlign: 'center', color: 'var(--text2)' }}>Loading dashboard...</div>;

        { label: 'Agents', count: stats.agents, icon: <Icons.bot />, color: '#c084fc' },
        { label: 'Gates', count: stats.gates, icon: <Icons.gate />, color: '#4ade80' },
        { label: 'Prompts', count: stats.prompts, icon: <Icons.doc />, color: '#fbbf24' },
        { label: 'Gate-Agent Map', count: stats.gate_agent_map, icon: <Icons.link />, color: '#fb923c' },

        { label: 'Conversations', count: stats.conversations, icon: <Icons.chat />, color: '#60a5fa' },
        { label: 'Messages', count: stats.conversation_messages, icon: <Icons.msg />, color: '#4ade80' },
        { label: 'Gate Results', count: stats.gate_results, icon: <Icons.check />, color: '#c084fc' },
        { label: 'Agent Decisions', count: stats.agent_decisions, icon: <Icons.brain />, color: '#fbbf24' },
        { label: 'Compliance Checks', count: stats.compliance_checks, icon: <Icons.shield />, color: '#f87171' },
        { label: 'Pricing Traces', count: stats.pricing_traces, icon: <Icons.dollar />, color: '#2dd4bf' },
      ];

      return (
        <div className="fade-in">
          <h2 style={{ margin: '0 0 4px', fontSize: 20, fontWeight: 700 }}>A.S.C.E.N.D. Dashboard</h2>
          <p style={{ margin: '0 0 20px', fontSize: 13, color: 'var(--text2)' }}>Multi-agent orchestration system overview</p>

          <h3 style={{ fontSize: 14, color: 'var(--text2)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Configuration Tables</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 12, marginBottom: 24 }}>
            {config.map(s => (
              <div key={s.label} className="stat-card">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <span style={{ color: s.color }}>{s.icon}</span>
                </div>
                <div className="stat-value" style={{ color: s.color }}>{s.count}</div>
                <div className="stat-label">{s.label}</div>
              </div>
            ))}
          </div>

          <h3 style={{ fontSize: 14, color: 'var(--text2)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: '0.05em' }}>Runtime & Audit Tables</h3>

    }

    // MAIN APP
    // ══════════════════════════════════════════════════════════════════
    function App() {
      const [page, setPage] = useState('dashboard');
      const [serviceKey, setServiceKey] = useState('');
      const [toastMsg, setToastMsg] = useState(null);

      const db = useMemo(() => createClient(serviceKey), [serviceKey]);
      const toast = (msg, type) => setToastMsg({ msg, type });

      const navSections = [
        { label: 'Overview', items: [
          { key: 'dashboard', label: 'Dashboard', icon: <Icons.home /> },
        ]},
        { label: 'Configuration', items: [
          { key: 'prompts', label: 'Prompts', icon: <Icons.doc /> },
          { key: 'llm_models', label: 'LLM Models', icon: <Icons.cpu /> },
          { key: 'agents', label: 'Agents', icon: <Icons.bot /> },
          { key: 'gates', label: 'Gates', icon: <Icons.gate /> },
          { key: 'gate_agent_map', label: 'Gate-Agent Map', icon: <Icons.link /> },
        ]},
        { label: 'Runtime', items: [
          { key: 'conversations', label: 'Conversations', icon: <Icons.chat /> },
          { key: 'conversation_messages', label: 'Messages', icon: <Icons.msg /> },
          { key: 'gate_results', label: 'Gate Results', icon: <Icons.check /> },
        ]},
        { label: 'Audit', items: [
          { key: 'agent_decisions', label: 'Agent Decisions', icon: <Icons.brain /> },
          { key: 'compliance_checks', label: 'Compliance', icon: <Icons.shield /> },
          { key: 'pricing_traces', label: 'Pricing Traces', icon: <Icons.dollar /> },
        ]},
      ];

      return (
        <div style={{ display: 'flex', minHeight: '100vh' }}>
          {/* Sidebar */}
          <div style={{ width: 240, background: 'var(--surface)', borderRight: '1px solid var(--border)', padding: '16px 12px', flexShrink: 0, overflowY: 'auto' }} className="scrollbar-thin">
            <div style={{ padding: '4px 8px 16px', borderBottom: '1px solid var(--border)', marginBottom: 12 }}>
              <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: '-0.02em' }}>A.S.C.E.N.D.</div>
              <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2 }}>Admin Panel · Breslow QuoteApp</div>
            </div>
            {navSections.map(section => (
              <div key={section.label} style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text2)', padding: '0 8px', marginBottom: 6 }}>{section.label}</div>
                {section.items.map(item => (
                  <div key={item.key} className={`nav-item ${page === item.key ? 'active' : ''}`} onClick={() => setPage(item.key)}>
                    {item.icon} {item.label}
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* Main Content */}
          <div style={{ flex: 1, padding: 24, overflowY: 'auto', maxHeight: '100vh' }} className="scrollbar-thin">
            <ServiceKeyBanner serviceKey={serviceKey} setServiceKey={setServiceKey} />

            {page === 'dashboard' && <Dashboard db={db} />}
            {page === 'prompts' && <PromptsManager db={db} toast={toast} />}
            {page !== 'dashboard' && page !== 'prompts' && TABLE_CONFIGS[page] && (
              <GenericTable
                db={db}
                toast={toast}
                tableName={page}
                columns={TABLE_CONFIGS[page].columns}
                orderBy={TABLE_CONFIGS[page].orderBy}
                readOnly={TABLE_CONFIGS[page].readOnly}
                title={TABLE_CONFIGS[page].title}
                description={TABLE_CONFIGS[page].description}
              />
            )}
          </div>

          {toastMsg && <Toast message={toastMsg.msg} type={toastMsg.type} onClose={() => setToastMsg(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
